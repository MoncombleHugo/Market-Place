<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Market Data Visualization Client</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      
      h1 {
        margin-top: 0;
      }
      
      .main-layout {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        margin-top: 20px;
      }

      .chart-container {
        width: 100%;
        height: 60%;
      }

      .bottom-panel {
        display: flex;
        height: 40%;
        width: 100%;
        border-top: 1px solid #ddd;
      }

      .orderbook-container {
        width: 50%;
        padding: 10px;
        border-right: 1px solid #ddd;
        overflow: auto;
      }

      .trades-container {
        width: 50%;
        padding: 10px;
        overflow: auto;
      }

      #trades-list {
        max-height: 100%;
        overflow-y: auto;
      }

      .trade-item {
        padding: 5px;
        margin: 2px 0;
        border-radius: 3px;
        font-size: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }

      .trade-buy {
        background-color: rgba(0, 255, 0, 0.1);
      }

      .trade-sell {
        background-color: rgba(255, 0, 0, 0.1);
      }

      .trade-price {
        font-weight: bold;
      }
      
      .controls {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      
      .date-range {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      
      button {
        padding: 5px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Bloomberg</h1>
    <div class="controls">
      <div class="date-range">
        <label for="start-date">Start Date:</label>
        <input type="datetime-local" id="start-date" />
        <label for="end-date">End Date:</label>
        <input type="datetime-local" id="end-date" />
        <button id="apply-range">Apply Range</button>
      </div>
      <div>
        <label for="candle-interval">Candle Interval:</label>
        <select id="candle-interval">
          <option value="10">10s</option>
          <option value="30">30s</option>
          <option value="60">1m</option>
          <option value="1800">30m</option>
          <option value="3600">1h</option>
        </select>
      </div>
    </div>
    
    <div class="main-layout">
      <div class="chart-container">
        <div id="plot"></div>
      </div>
      <div class="bottom-panel">
        <div class="orderbook-container">
          <button id="toggle-orderbook">Show Order Book</button>
          <div id="orderbook-plot" style="display: none;"></div>
        </div>
        <div class="trades-container">
          <h3>Recent Trades (Last 10)</h3>
          <div id="trades-list"></div>
        </div>
      </div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
